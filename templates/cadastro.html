{% extends 'base.html' %}

{% block title %}Cadastro - Agenda IA{% endblock %}

{% block body_class %}bg-light d-flex align-items-center vh-100{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Criar Conta</h3>
                    <form action="{{ url_for('cadastro') }}" method="POST">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" name="nome" placeholder="Seu nome" required value="{{ request.form.nome or '' }}">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="nome@exemplo.com" required value="{{ request.form.email or '' }}">
                        </div>
                        <div class="mb-4">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" name="senha" placeholder="Crie uma senha" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                    </form>
                    <div class="text-center mt-3">
                        <small>Já tem uma conta? <a href="{{ url_for('login') }}" class="text-decoration-none">Faça login</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
