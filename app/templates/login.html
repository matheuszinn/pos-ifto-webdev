{% extends 'base.html' %}

{% block title %}Login - Agenda IA{% endblock %}

{% block body_class %}bg-light d-flex align-items-center vh-100{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Bem-vindo de volta</h3>
                    <form action="{{ url_for('main.login') }}" method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="nome@exemplo.com" required value="{{ request.form.email or '' }}">
                        </div>
                        <div class="mb-4">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" name="senha" placeholder="Sua senha" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Entrar</button>
                    </form>
                    <div class="text-center mt-3">
                        <small>Não possui conta? <a href="{{ url_for('main.cadastro') }}" class="text-decoration-none">Cadastre-se</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
